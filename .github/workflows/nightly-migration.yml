name: Nightly Edge Function Migration

on:
  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:
    inputs:
      count:
        description: "Number of functions to migrate"
        required: false
        default: "3"
      dry_run:
        description: "Dry run (no changes)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Run migration
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '3' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS="--count $COUNT"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          cd backend && bun run scripts/migrate-functions.ts $ARGS

      - name: Create PR if changes
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for actual changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes — skipping PR"
            exit 0
          fi

          DATE=$(date +%Y-%m-%d)
          RUN="${{ github.run_number }}"
          BRANCH="auto/migrate-edge-functions-${DATE}-${RUN}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add backend/ src/lib/supabaseEdgeFunctions.ts
          git commit -m "chore: nightly migration of edge functions ($DATE)

          Automated by Claude Code. Functions ported but NOT activated."
          git push -u origin "$BRANCH"

          # Build PR body
          MIGRATED=$(cat backend/migration-state.json | bun -e "
            const s = JSON.parse(await Bun.stdin.text());
            const today = new Date().toISOString().split('T')[0];
            const list = s.functions
              .filter(f => f.migratedAt?.startsWith(today))
              .map(f => '- \`' + f.name + '\` → \`' + f.target + '\`')
              .join('\n');
            console.log(list || 'State updated only');
          ")

          REMAINING=$(cat backend/migration-state.json | bun -e "
            const s = JSON.parse(await Bun.stdin.text());
            const p = s.functions.filter(f => f.status === 'pending').length;
            const o = s.functions.filter(f => f.status === 'outdated').length;
            console.log(p + ' pending, ' + o + ' outdated');
          ")

          gh pr create \
            --title "🔄 Nightly migration ($DATE)" \
            --body "$(cat <<EOF
          ## Functions ported
          $MIGRATED

          **Remaining: $REMAINING**

          ## To activate
          1. Review code in \`backend/src/\`
          2. Test: \`cd backend && bun dev\`
          3. Uncomment in \`src/lib/supabaseEdgeFunctions.ts\` → \`migratedFunctions\`

          > ⚠️ NOT activated until you uncomment.
          EOF
          )" \
            --base main \
            --label "migration,automated"
